services:
  # Local MongoDB — only started when you opt in with: docker compose --profile local-db up
  # By default the app uses MONGODB_URI from the root .env (e.g. MongoDB Atlas).
  mongo:
    image: mongo:7
    profiles: ["local-db"]
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    restart: unless-stopped
    environment:
      PORT: "4000"
      NODE_ENV: production
      # Defaults to the local-db container; override via root .env to use Atlas.
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/codebud}
      CLIENT_ORIGIN: http://localhost:8080
      COOKIE_SECURE: "false" # served over plain HTTP in this compose setup
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-8}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
    expose:
      - "4000"

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  mongo-data:
